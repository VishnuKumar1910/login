<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holidays Login</title>
<link rel="stylesheet" href="exp-css.css">
</head>

<body>

<div class="login-container">
    <h2>QWERTY HOLIDAYS</h2>

    <form>
        <div class="input-box">
            <input type="text" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <button class="btn">Login</button>

        <div class="reset">
            <p>Forgot password? <a href="#">Reset</a></p>
        </div>
    </form>
</div>

</body>
</html>
